<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <linearGradient id="globeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Globe outer circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#globeGradient)" stroke-width="2" opacity="0.3" />
  
  <!-- Main globe -->
  <g filter="url(#shadow)">
    <!-- Globe background -->
    <circle cx="100" cy="100" r="80" fill="url(#globeGradient)" opacity="0.95" />
    
    <!-- Continents (stylized) -->
    <g fill="rgba(255,255,255,0.25)">
      <!-- North America -->
      <path d="M 50 70 Q 55 65 65 68 Q 70 75 65 85 Q 55 82 50 80 Z" />
      <!-- South America -->
      <path d="M 55 95 Q 62 100 65 110 Q 58 115 52 108 Z" />
      <!-- Africa/Europe -->
      <path d="M 90 60 Q 110 65 120 75 Q 125 95 115 110 Q 95 105 88 95 Z" />
      <!-- Asia -->
      <path d="M 120 75 Q 145 80 150 100 Q 140 115 125 110 Z" />
    </g>
    
    <!-- Latitude lines -->
    <g stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none">
      <ellipse cx="100" cy="100" rx="80" ry="25" />
      <ellipse cx="100" cy="100" rx="80" ry="50" />
      <ellipse cx="100" cy="100" rx="80" ry="75" />
    </g>
    
    <!-- Longitude lines -->
    <g stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none">
      <path d="M 100 20 Q 90 60 100 100 Q 110 140 100 180" />
      <path d="M 75 35 Q 65 65 75 100 Q 85 135 75 165" />
      <path d="M 125 35 Q 135 65 125 100 Q 115 135 125 165" />
    </g>
    
    <!-- Highlight/shine effect -->
    <ellipse cx="75" cy="70" rx="25" ry="20" fill="rgba(255,255,255,0.2)" opacity="0.6" />
  </g>
  
  <!-- Outer ring accent -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#globeGradient)" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,5" />
</svg>
